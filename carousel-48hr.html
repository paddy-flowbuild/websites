<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FlowBuild — 48-Hour Process Carousel 4:5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#080807; --fg:#F0EBE0; --mu:#68635C; --mu2:#9A938A;
    --ac:#22C55E; --ac-d:#16A34A; --bd:#1E1E1C;
    --surf:#101010; --bad:#E0796E;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000}
  body{font-family:'Inter',sans-serif;color:var(--fg);-webkit-font-smoothing:antialiased}
  em,.serif{font-family:'EB Garamond',serif;font-style:italic;font-weight:500}

  .stage{display:flex;flex-direction:column;align-items:center;gap:40px;padding:40px}
  .slide{position:relative;width:1080px;height:1350px;overflow:hidden;background:var(--bg);
    color:var(--fg);flex:0 0 auto;display:flex;flex-direction:column}
  .slide::before{content:'';position:absolute;inset:0;z-index:0;
    background:
      radial-gradient(900px 700px at 80% -8%, rgba(34,197,94,.20), transparent 60%),
      radial-gradient(800px 800px at -12% 108%, rgba(34,197,94,.12), transparent 60%),
      radial-gradient(600px 500px at 50% 50%, rgba(22,30,18,.5), transparent 70%)}
  .slide::after{content:'';position:absolute;inset:0;z-index:50;pointer-events:none;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size:200px;opacity:.5;mix-blend-mode:overlay}
  .inner{position:relative;z-index:10;flex:1;display:flex;flex-direction:column;padding:80px}

  .topbar{display:flex;align-items:center;justify-content:space-between}
  .logo{font-size:34px;font-weight:900;letter-spacing:-.03em}
  .logo b{color:var(--ac)}
  .counter{font-size:18px;font-weight:600;color:var(--mu2);font-variant-numeric:tabular-nums}
  .counter span{color:var(--ac)}
  .eyebrow{display:inline-flex;align-items:center;gap:14px;font-size:16px;font-weight:600;
    letter-spacing:.18em;text-transform:uppercase;color:var(--ac)}
  .eyebrow::before{content:'';width:40px;height:1.5px;background:var(--ac);opacity:.8}

  /* ── COVER ───────────────────────────────────────────── */
  .cover .inner{justify-content:flex-start}
  .cover-mid{margin-top:46px;display:flex;flex-direction:column;gap:26px}
  .cover h1{font-size:100px;font-weight:900;line-height:.92;letter-spacing:-.045em}
  .cover h1 em{color:var(--ac);font-family:'Inter';font-style:normal}
  .cover-sub{font-size:25px;line-height:1.5;color:var(--mu2);max-width:740px}
  .mock{border-radius:18px;overflow:hidden;background:var(--surf);border:1px solid var(--bd);
    box-shadow:0 2px 0 rgba(255,255,255,.04) inset,0 40px 80px -30px rgba(0,0,0,.9),
      0 30px 90px -40px rgba(34,197,94,.35)}
  .chrome{height:50px;display:flex;align-items:center;gap:16px;padding:0 22px;
    background:#0d0d0c;border-bottom:1px solid var(--bd)}
  .dots{display:flex;gap:9px}.dots i{width:13px;height:13px;border-radius:50%;display:block}
  .dots i:nth-child(1){background:#ff5f57}.dots i:nth-child(2){background:#febc2e}.dots i:nth-child(3){background:#28c840}
  .addr{flex:1;height:30px;border-radius:8px;background:#070706;border:1px solid var(--bd);
    display:flex;align-items:center;padding:0 16px;font-size:15px;color:var(--mu2)}
  .shot{width:100%;display:block;object-fit:cover;object-position:top center}
  .cover .mock{margin-top:auto}.cover .shot{height:560px}
  .swipe{margin-top:30px;display:flex;align-items:center;gap:14px;font-size:19px;font-weight:600;color:var(--fg)}
  .swipe .ar{color:var(--ac);font-size:26px;letter-spacing:-6px}

  /* ── CONTRAST ────────────────────────────────────────── */
  .vs .inner{justify-content:flex-start}
  .vs h2{margin-top:40px;font-size:66px;font-weight:900;line-height:1;letter-spacing:-.04em}
  .vs h2 em{color:var(--ac)}
  .cards{margin-top:auto;margin-bottom:6px;display:flex;flex-direction:column;gap:24px}
  .card{border-radius:20px;padding:38px 40px;border:1px solid var(--bd);background:rgba(255,255,255,.02)}
  .card.good{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.06);
    box-shadow:0 30px 80px -40px rgba(34,197,94,.4)}
  .card-h{font-size:18px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:var(--mu2);margin-bottom:24px}
  .card.good .card-h{color:var(--ac)}
  .li{display:flex;align-items:center;gap:18px;font-size:28px;font-weight:600;padding:11px 0}
  .li .mk{flex:0 0 38px;width:38px;height:38px;border-radius:50%;display:grid;place-items:center;
    font-size:20px;font-weight:800}
  .bad .mk{background:rgba(224,121,110,.14);color:var(--bad)}
  .bad .li{color:#B9B2A8}
  .good .mk{background:rgba(34,197,94,.16);color:var(--ac)}

  /* ── PROCESS STEPS ───────────────────────────────────── */
  .step .inner{justify-content:flex-start}
  .step-hour{margin-top:60px;font-size:30px;font-weight:800;letter-spacing:.04em;color:var(--ac)}
  .step h2{margin-top:10px;font-size:118px;font-weight:900;line-height:.92;letter-spacing:-.05em}
  .step h2 em{color:var(--ac);font-family:'Inter';font-style:normal}
  .step-name{margin-top:36px;font-size:46px;font-weight:800;letter-spacing:-.03em}
  .step-desc{margin-top:20px;font-size:27px;line-height:1.55;color:var(--mu2);max-width:840px}
  .timeline{margin-top:auto}
  .tl-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px}
  .tl-top .now{font-size:19px;font-weight:700;color:var(--fg)}
  .tl-top .pct{font-size:19px;font-weight:600;color:var(--ac);font-variant-numeric:tabular-nums}
  .tl-track{height:8px;border-radius:100px;background:#17170f;position:relative;overflow:visible}
  .tl-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--ac-d),var(--ac));position:relative}
  .tl-fill::after{content:'';position:absolute;right:-7px;top:50%;transform:translateY(-50%);
    width:18px;height:18px;border-radius:50%;background:var(--ac);box-shadow:0 0 16px var(--ac)}
  .tl-labels{display:flex;justify-content:space-between;margin-top:16px;font-size:16px;color:var(--mu)}

  /* ── PROOF ───────────────────────────────────────────── */
  .proof .inner{justify-content:flex-start}
  .proof-cat{margin-top:54px;align-self:flex-start;display:inline-flex;align-items:center;gap:10px;
    font-size:16px;font-weight:700;letter-spacing:.04em;color:var(--ac);background:rgba(34,197,94,.10);
    border:1px solid rgba(34,197,94,.28);border-radius:100px;padding:9px 18px}
  .proof-cat::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--ac);box-shadow:0 0 12px var(--ac)}
  .proof h2{margin-top:22px;font-size:74px;font-weight:900;line-height:.98;letter-spacing:-.04em}
  .proof-sub{margin-top:16px;font-size:22px;color:var(--mu2);max-width:820px;line-height:1.45}
  .proof-sub b{color:var(--fg);font-weight:600}
  .proof .mock{margin-top:auto;margin-bottom:6px}.proof .shot{height:560px}
  .stats{display:flex;gap:50px;margin-top:34px}
  .stat .n{font-size:50px;font-weight:900;letter-spacing:-.03em;color:var(--ac)}
  .stat .l{font-size:17px;color:var(--mu2);margin-top:4px}

  /* ── CTA ─────────────────────────────────────────────── */
  .cta .inner{justify-content:space-between}
  .cta-mid{display:flex;flex-direction:column;gap:30px;margin-top:40px}
  .cta h2{font-size:96px;font-weight:900;line-height:.95;letter-spacing:-.045em}
  .cta h2 em{color:var(--ac);font-family:'Inter';font-style:normal}
  .cta-no{display:flex;flex-direction:column;gap:14px}
  .cta-no .li{font-size:26px;color:var(--fg);font-weight:600}
  .cta-no .mk{background:rgba(34,197,94,.16);color:var(--ac)}
  .cta-btn{align-self:flex-start;display:inline-flex;align-items:center;gap:14px;background:var(--ac);
    color:#05140a;font-size:24px;font-weight:800;padding:24px 44px;border-radius:14px;
    box-shadow:0 24px 60px -24px rgba(34,197,94,.7)}
  .cta-foot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--bd);padding-top:36px}
  .cta-site{font-size:30px;font-weight:800;letter-spacing:-.02em}.cta-site b{color:var(--ac)}
  .cta-handle{font-size:20px;color:var(--mu2)}
  .plabel{color:#555;font:600 14px Inter}
</style>
</head>
<body>
<div class="stage" id="stage"></div>
<script>
  const BB = 'screenshots/barbells-babies.png';
  const lock = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#9A938A" stroke-width="2.4"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg> ';
  const X='✕', T='✓';
  const li = (cls,mk,txt)=>`<div class="li ${cls}"><span class="mk">${mk}</span>${txt}</div>`;
  const logo = '<div class="logo">Flow<b>Build</b></div>';

  const steps = [
    {hour:'HOUR 0', big:'The<br>call.', name:'A 20-minute discovery call',
     desc:'We learn your business, your customers and exactly what you need. No long briefs, no forms to fill in — just a quick chat.',
     now:'Kick-off', pct:'0%', fill:'2%'},
    {hour:'HOURS 1–24', big:'Design<br>&amp; build.', name:'Custom-built from scratch',
     desc:'We design and build your site by hand — your brand, your voice, clean custom code. No templates. No drag-and-drop page builders.',
     now:'In build', pct:'50%', fill:'50%'},
    {hour:'HOURS 24–44', big:'Review<br>&amp; refine.', name:'You see it live, we perfect it',
     desc:'You get a live preview and tell us what to tweak. We refine the copy, colours and layout until it’s exactly right.',
     now:'Refining', pct:'92%', fill:'92%'},
    {hour:'HOUR 48', big:'You’re<br><em>live.</em>', name:'Launched on your own domain',
     desc:'Your site goes live on your domain. Hosting, SSL and the technical lot — all handled by us. You just share the link.',
     now:'Live', pct:'100%', fill:'100%'},
  ];

  const slides = [];

  // 1 — COVER
  slides.push(`
  <section class="slide cover">
    <div class="inner">
      <div class="topbar">${logo}<div class="counter">Case study · <span>48h</span></div></div>
      <div class="cover-mid">
        <div class="eyebrow">How we work</div>
        <h1>We built this<br>website in<br><em>48 hours.</em></h1>
        <p class="cover-sub">No agency. No inflated quote. No three-month wait. Here’s exactly what the process looks like. 👉</p>
      </div>
      <div class="mock">
        <div class="chrome"><div class="dots"><i></i><i></i><i></i></div><div class="addr">${lock}barbellsandbabies.ie</div></div>
        <img class="shot" src="${BB}" alt="Barbells & Babies">
      </div>
    </div>
  </section>`);

  // 2 — CONTRAST
  slides.push(`
  <section class="slide vs">
    <div class="inner">
      <div class="topbar">${logo}<div class="counter">The difference</div></div>
      <h2>Getting a website<br>shouldn’t be <em>this hard.</em></h2>
      <div class="cards">
        <div class="card bad">
          <div class="card-h">The agency way</div>
          ${li('', X,'€4,000+ inflated quotes')}
          ${li('', X,'8–12 weeks of waiting')}
          ${li('', X,'Account managers &amp; middlemen')}
        </div>
        <div class="card good">
          <div class="card-h">The FlowBuild way</div>
          ${li('', T,'One flat, honest price')}
          ${li('', T,'Live in 48 hours')}
          ${li('', T,'Straight to the person who builds it')}
        </div>
      </div>
    </div>
  </section>`);

  // 3–6 — PROCESS
  steps.forEach((s,i)=>{
    const n=String(i+1).padStart(2,'0');
    slides.push(`
    <section class="slide step">
      <div class="inner">
        <div class="topbar">${logo}<div class="counter">Step <span>${n}</span> / 04</div></div>
        <div class="step-hour">${s.hour}</div>
        <h2>${s.big}</h2>
        <div class="step-name">${s.name}</div>
        <p class="step-desc">${s.desc}</p>
        <div class="timeline">
          <div class="tl-top"><span class="now">${s.now}</span><span class="pct">${s.pct} · ${s.now==='Live'?'done':'of 48h'}</span></div>
          <div class="tl-track"><div class="tl-fill" style="width:${s.fill}"></div></div>
          <div class="tl-labels"><span>Hour 0</span><span>Hour 24</span><span>Hour 48</span></div>
        </div>
      </div>
    </section>`);
  });

  // 7 — PROOF
  slides.push(`
  <section class="slide proof">
    <div class="inner">
      <div class="topbar">${logo}<div class="counter">The result</div></div>
      <div class="proof-cat">Pre &amp; Postnatal Coaching</div>
      <h2>Barbells &amp; Babies</h2>
      <p class="proof-sub"><b>barbellsandbabies.ie</b> — designed, built and live in 48 hours. Custom-built, no templates.</p>
      <div class="stats">
        <div class="stat"><div class="n">48h</div><div class="l">Brief to live</div></div>
        <div class="stat"><div class="n">0</div><div class="l">Templates used</div></div>
        <div class="stat"><div class="n">1</div><div class="l">Flat price</div></div>
      </div>
      <div class="mock">
        <div class="chrome"><div class="dots"><i></i><i></i><i></i></div><div class="addr">${lock}barbellsandbabies.ie</div></div>
        <img class="shot" src="${BB}" alt="Barbells & Babies">
      </div>
    </div>
  </section>`);

  // 8 — CTA
  slides.push(`
  <section class="slide cta">
    <div class="inner">
      <div class="topbar">${logo}<div class="counter">Your turn →</div></div>
      <div class="cta-mid">
        <div class="eyebrow">Let’s build yours</div>
        <h2>Want yours in<br><em>48 hours?</em></h2>
        <div class="cta-no">
          ${li('', T,'No inflated quotes')}
          ${li('', T,'No long build times')}
          ${li('', T,'No agencies — ever')}
        </div>
        <span class="cta-btn">Get a free quote →</span>
      </div>
      <div class="cta-foot">
        <div class="cta-site">Flow<b>Build</b> · flowbuildai.ie</div>
        <div class="cta-handle">DM us “48” to start</div>
      </div>
    </div>
  </section>`);

  const stage=document.getElementById('stage');
  const only=new URLSearchParams(location.search).get('slide');
  if(only){stage.style.padding='0';stage.style.gap='0';stage.innerHTML=slides[parseInt(only,10)-1]||'';}
  else{stage.innerHTML=slides.map((s,i)=>`<div class="plabel">Slide ${i+1} / ${slides.length}</div>${s}`).join('');}
</script>
</body>
</html>
